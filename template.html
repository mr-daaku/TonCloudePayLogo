<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
margin:0;
width:800px;
height:360px;
background:#0b0f2a;
font-family:Arial;
}

.card{
width:800px;
height:360px;
background:linear-gradient(135deg,#0c1a4f,#1a0c3f);
color:white;
padding:30px;
box-sizing:border-box;
}

.title{
font-size:32px;
font-weight:bold;
}

.promobox{
margin-top:20px;
height:60px;
background:#12e0c2;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
color:#05102e;
}

.reward{
font-size:44px;
color:#23ffc7;
margin-top:30px;
}

.boxes{
display:flex;
gap:20px;
margin-top:20px;
}

.box{
flex:1;
background:rgba(255,255,255,0.06);
padding:10px;
border-radius:10px;
}

.label{
font-size:12px;
color:#9db3ff;
}

.value{
font-size:18px;
}

</style>

</head>

<body>

<div class="card">

<div class="title">🎁 PROMO REWARD</div>

<div class="promobox">
{{CODE}}
</div>

<div class="reward">
{{REWARD}} {{CURRENCY}}
</div>

<div style="font-size:12px;color:#9db3ff">per user</div>

<div class="boxes">

<div class="box">
<div class="label">USAGE LIMIT</div>
<div class="value">{{LIMIT}} users</div>
</div>

<div class="box">
<div class="label">TOTAL POOL</div>
<div class="value">{{TOTAL}} {{CURRENCY}}</div>
</div>

<div class="box">
<div class="label">STATUS</div>
<div class="value" style="color:#00ffb3">ACTIVE</div>
</div>

</div>

</div>

</body>
</html>
